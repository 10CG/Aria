## Tasks

### Phase 1: 核心 Agent 和 Skill 创建

```yaml
- id: TASK-001
  parent: "1.1"
  title: 创建 aria:code-reviewer Agent
  complexity: L (Large, 4-8h)
  dependencies: []
  deliverables:
    - aria/agents/code-reviewer.md
  agent: tech-lead
  reason: Agent 架构设计，两阶段审查流程定义，需要技术领导决策
  verification:
    - Agent 文件符合 Aria Agent 规范
    - 两阶段审查流程清晰定义
    - 输出格式与 Superpowers 兼容
    - 中英双语支持验证通过

- id: TASK-002
  parent: "1.2"
  title: 创建 requesting-code-review Skill
  complexity: M (Medium, 2-4h)
  dependencies: []
  deliverables:
    - aria/skills/requesting-code-review/SKILL.md
  agent: tech-lead
  reason: Skill 规格定义，使用场景设计，需要技术领导决策
  verification:
    - Skill 文件符合 Aria Skill 规范
    - 触发条件清晰定义
    - 调用示例完整可用
    - 中英双语支持验证通过

- id: TASK-003
  parent: "1.3"
  title: 创建 Agent 模板文件
  complexity: M (Medium, 2-4h)
  dependencies: [TASK-001]
  deliverables:
    - aria/skills/requesting-code-review/code-reviewer.md
  agent: tech-lead
  reason: 模板设计依赖 Agent 规范，需要技术一致性
  verification:
    - 占位符变量完整定义
    - Phase 1/2 检查清单完整
    - 输出格式模板可独立使用
    - 与 Superpowers 模板对比验证通过
```

### Phase 2: 集成与文档

```yaml
- id: TASK-004
  parent: "2.1"
  title: 更新 subagent-driver Skill 集成
  complexity: M (Medium, 2-4h)
  dependencies: [TASK-001, TASK-002]
  deliverables:
    - aria/skills/subagent-driver/SKILL.md
  agent: tech-lead
  reason: 集成设计需要理解两个新组件，向后兼容需要技术决策
  verification:
    - 两阶段审查选项正确集成
    - 工作流文档更新
    - 现有功能不受影响
    - 向后兼容性验证通过

- id: TASK-005
  parent: "2.2"
  title: 编写使用文档和示例
  complexity: L (Large, 4-8h)
  dependencies: [TASK-001, TASK-002, TASK-003]
  deliverables:
    - aria/skills/requesting-code-review/examples/phase1-pass-phase2-pass.md
    - aria/skills/requesting-code-review/examples/phase1-fail-blocking.md
    - aria/skills/requesting-code-review/examples/phase2-fail-with-warnings.md
    - aria/skills/requesting-code-review/examples/no-plan-fallback.md
    - aria/skills/requesting-code-review/examples/large-changeset-batching.md
    - aria/skills/requesting-code-review/examples/skill-invocation.md
    - aria/skills/requesting-code-review/examples/direct-agent-call.md
    - aria/skills/requesting-code-review/examples/best-practices.md
  agent: knowledge-manager
  reason: 文档组织和知识管理，需要知识管理 Agent 专长
  verification:
    - 7 个示例场景覆盖主要使用场景
    - 每个示例包含输入输出和预期结果
    - 最佳实践指南完整
    - 中英双语支持验证通过

- id: TASK-006
  parent: "2.3"
  title: 手动集成测试
  complexity: L (Large, 4-8h)
  dependencies: [TASK-004, TASK-005]
  deliverables:
    - aria/skills/requesting-code-review/testing/test-scenarios.md
    - aria/skills/requesting-code-review/testing/test-report.md
  agent: qa-engineer
  reason: 质量保证和测试场景设计，需要 QA 专长
  verification:
    - 7 个测试场景全部执行
    - 测试报告完整记录结果
    - 发现的问题已修复或记录
    - 测试场景可作为用户参考
```

### Phase 3: 验证与发布

```yaml
- id: TASK-007
  parent: "3.1"
  title: 文档完善
  complexity: M (Medium, 2-4h)
  dependencies: [TASK-006]
  deliverables:
    - aria/CHANGELOG.md
    - aria/README.md
    - docs/architecture/system-architecture.md
    - aria/.claude-plugin/plugin.json
  agent: knowledge-manager
  reason: 跨文档一致性维护和知识管理，需要知识管理 Agent
  verification:
    - CHANGELOG.md 包含 v1.4.0 条目
    - README.md Skills 数量更新
    - 系统架构文档包含新组件
    - plugin.json 版本号更新

- id: TASK-008
  parent: "3.2"
  title: 版本发布准备
  complexity: M (Medium, 2-4h)
  dependencies: [TASK-007]
  deliverables:
    - aria/VERSION
    - aria/RELEASE_NOTES.md
  agent: tech-lead
  reason: 发布决策和版本验证，需要技术领导
  verification:
    - VERSION 文件更新为 v1.4.0
    - 所有文件版本号一致性验证
    - Release Notes 完整描述变更
    - 发布检查清单全部通过
```

