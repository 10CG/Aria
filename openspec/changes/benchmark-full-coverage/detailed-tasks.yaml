metadata:
  feature: benchmark-full-coverage
  datasource: "tasks.md"
  spec_path: "openspec/changes/benchmark-full-coverage/"
  total_tasks: 26
  estimated_hours: 24
  success_criteria:
    - "28/28 Skill 在 config.json 中有 enabled eval"
    - "全量运行通过率 >= 80%"
    - "Tier A 通过率 >= 90%"
    - "无新增环境依赖"
    - "OVERALL_BENCHMARK_SUMMARY.md 更新"

tasks:
  # ============================================================
  # Phase 1: Tier A 单轮可测 Skills (16 个)
  # ============================================================

  # --- 1.1 Phase 编排类 (4 个) ---

  - id: TASK-001
    parent: "1.1.1"
    title: "phase-a-planner: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (phase-a-planner entry)"
    verification:
      - "prompt 触发 Phase A 编排逻辑"
      - "assertions 检测状态扫描、spec创建、任务规划输出"
    eval_spec:
      skill: phase-a-planner
      evals:
        - id: "real-1"
          name: "plan-todo-feature"
          prompt: "Run Phase A planning for adding a notification feature to this project. Analyze current state and suggest a planning approach. Do not create any files, just output your analysis."
          assertions:
            - text: "scans_state"
              check: "status|state|scan|git|branch|状态|扫描"
            - text: "suggests_spec"
              check: "spec|proposal|OpenSpec|Level|规范|提案"
            - text: "plans_tasks"
              check: "task|plan|decompose|分解|任务|规划"

  - id: TASK-002
    parent: "1.1.2"
    title: "phase-b-developer: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (phase-b-developer entry)"
    verification:
      - "prompt 触发 Phase B 开发流程分析"
      - "assertions 检测分支创建、开发执行、测试验证"
    eval_spec:
      skill: phase-b-developer
      evals:
        - id: "real-1"
          name: "analyze-dev-workflow"
          prompt: "Analyze how Phase B development workflow should proceed for this project. What branch strategy and development steps would you recommend? Do not create branches or modify files."
          assertions:
            - text: "suggests_branch"
              check: "branch|分支|feature/|bugfix/"
            - text: "mentions_development"
              check: "develop|implement|code|开发|实现|编码"
            - text: "mentions_testing"
              check: "test|verify|validate|测试|验证|TDD"

  - id: TASK-003
    parent: "1.1.3"
    title: "phase-c-integrator: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (phase-c-integrator entry)"
    verification:
      - "prompt 触发 Phase C 集成流程分析"
      - "assertions 检测提交规范、合并策略"
    eval_spec:
      skill: phase-c-integrator
      evals:
        - id: "real-1"
          name: "analyze-integration-workflow"
          prompt: "Analyze the current git state and suggest an integration strategy. What commit conventions and merge approach should be used? Do not create commits or merge anything."
          assertions:
            - text: "mentions_commit"
              check: "commit|提交|conventional|Conventional"
            - text: "mentions_merge"
              check: "merge|PR|pull request|合并|集成"
            - text: "follows_convention"
              check: "feat|fix|docs|chore|refactor|convention|规范"

  - id: TASK-004
    parent: "1.1.4"
    title: "phase-d-closer: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (phase-d-closer entry)"
    verification:
      - "prompt 触发 Phase D 收尾流程分析"
      - "assertions 检测进度更新、归档建议"
    eval_spec:
      skill: phase-d-closer
      evals:
        - id: "real-1"
          name: "analyze-closure-workflow"
          prompt: "Analyze what closure steps are needed for this project. Check if there are any completed specs that need archiving or progress that needs updating. Do not modify any files."
          assertions:
            - text: "checks_progress"
              check: "progress|update|status|进度|更新|状态"
            - text: "checks_archive"
              check: "archive|complete|归档|完成|收尾"

  # --- 1.2 分支与完成类 (2 个) ---

  - id: TASK-005
    parent: "1.2.1"
    title: "branch-manager: 编写 2 个真实执行 eval"
    status: pending
    complexity: M
    estimated_hours: 2
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (branch-manager entry with 2 evals)"
    verification:
      - "eval-1: 分支命名建议正确"
      - "eval-2: 模式决策 (Branch vs Worktree) 合理"
    eval_spec:
      skill: branch-manager
      evals:
        - id: "real-1"
          name: "suggest-branch-name"
          prompt: "I need to implement a user notification feature. What branch name should I create? Analyze the task and suggest a branch name following conventions. Do not create the branch."
          assertions:
            - text: "suggests_branch_name"
              check: "feature/|bugfix/|hotfix/"
            - text: "follows_naming"
              check: "notification|notify|通知"
        - id: "real-2"
          name: "decide-isolation-mode"
          prompt: "I need to refactor the authentication module which touches 8 files across backend and frontend. Should I use a regular branch or a worktree? Analyze the factors and recommend. Do not create anything."
          assertions:
            - text: "analyzes_factors"
              check: "file|factor|risk|score|complex|文件|因子|风险|复杂"
            - text: "recommends_mode"
              check: "branch|worktree|Mode [AB]|隔离|模式"

  - id: TASK-006
    parent: "1.2.2"
    title: "branch-finisher: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (branch-finisher entry)"
    verification:
      - "prompt 触发分支完成流程分析"
      - "assertions 检测测试验证、完成选项"
    eval_spec:
      skill: branch-finisher
      evals:
        - id: "real-1"
          name: "analyze-branch-completion"
          prompt: "Analyze the current branch state and suggest completion options. What checks should be done before finishing this branch? Do not modify any branches."
          assertions:
            - text: "checks_tests"
              check: "test|verify|check|测试|验证|检查"
            - text: "offers_options"
              check: "PR|merge|commit|continue|abort|提交|合并|继续|放弃|\\[\\d\\]"

  # --- 1.3 架构文档类 (3 个) ---

  - id: TASK-007
    parent: "1.3.1"
    title: "arch-common: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (arch-common entry)"
    verification:
      - "assertions 检测层级体系识别"
    eval_spec:
      skill: arch-common
      evals:
        - id: "real-1"
          name: "identify-architecture-layers"
          prompt: "Analyze the architecture documentation structure of this project. Identify the documentation layers (L0/L1/L2) and their relationships."
          assertions:
            - text: "identifies_layers"
              check: "L0|L1|L2|layer|层|PRD|Architecture|OpenSpec"
            - text: "finds_docs"
              check: "docs/|architecture|ARCHITECTURE|system-architecture|\\.(md)"

  - id: TASK-008
    parent: "1.3.2"
    title: "arch-scaffolder: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (arch-scaffolder entry)"
    verification:
      - "assertions 检测架构骨架生成能力"
    eval_spec:
      skill: arch-scaffolder
      evals:
        - id: "real-1"
          name: "scaffold-from-prd"
          prompt: "Based on the PRD at docs/requirements/prd-todo-optimization-v1.md, suggest an architecture document skeleton. What sections and components should be included? Output the skeleton directly, do not create files."
          assertions:
            - text: "extracts_prd"
              check: "PRD|requirement|需求|product"
            - text: "generates_skeleton"
              check: "##|section|component|module|overview|架构|组件|模块"
            - text: "includes_tech_stack"
              check: "technology|tech|stack|Node|Express|frontend|backend|技术"

  - id: TASK-009
    parent: "1.3.3"
    title: "arch-update: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (arch-update entry)"
    verification:
      - "assertions 检测架构文档更新建议"
    eval_spec:
      skill: arch-update
      evals:
        - id: "real-1"
          name: "suggest-arch-updates"
          prompt: "Review the current system architecture doc at docs/architecture/system-architecture.md and check if it needs updates based on recent code changes. What sections are outdated? Do not modify the file."
          assertions:
            - text: "reads_arch_doc"
              check: "system-architecture|architecture|架构"
            - text: "identifies_changes"
              check: "update|change|outdated|add|section|更新|变更|过时|新增"

  # --- 1.4 工作流与路由类 (3 个) ---

  - id: TASK-010
    parent: "1.4.1"
    title: "agent-router: 编写 2 个真实执行 eval"
    status: pending
    complexity: M
    estimated_hours: 2
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (agent-router entry with 2 evals)"
    verification:
      - "eval-1: 单任务正确路由到对应 Agent"
      - "eval-2: 多 Agent 协作检测"
    eval_spec:
      skill: agent-router
      evals:
        - id: "real-1"
          name: "route-backend-task"
          prompt: "I need to design a REST API for user management with CRUD operations and JWT authentication. Which agent should handle this task? Analyze and recommend."
          assertions:
            - text: "identifies_agent"
              check: "backend-architect|backend|API|architect|后端"
            - text: "provides_reasoning"
              check: "reason|because|suitable|match|原因|适合|匹配"
        - id: "real-2"
          name: "detect-multi-agent"
          prompt: "I need to build a feature that requires a new database schema, a REST API, and a React frontend component. Which agents are needed? Analyze the task complexity."
          assertions:
            - text: "detects_multiple_agents"
              check: "backend|frontend|mobile|architect|developer|多个|协作"
            - text: "assigns_responsibilities"
              check: "database|API|UI|component|schema|数据库|接口|组件"

  - id: TASK-011
    parent: "1.4.2"
    title: "workflow-runner: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (workflow-runner entry)"
    verification:
      - "assertions 检测工作流编排能力"
    eval_spec:
      skill: workflow-runner
      evals:
        - id: "real-1"
          name: "plan-workflow-execution"
          prompt: "I want to run a new-feature workflow for this project. Analyze what steps would be needed and in what order. Do not execute any steps, just plan the workflow."
          assertions:
            - text: "identifies_phases"
              check: "Phase [ABCD]|phase|A\\.|B\\.|C\\.|D\\.|阶段|步骤"
            - text: "defines_order"
              check: "order|sequence|first|then|next|顺序|先|然后|接下来|→"

  - id: TASK-012
    parent: "1.4.3"
    title: "progress-updater: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (progress-updater entry)"
    verification:
      - "assertions 检测进度状态生成"
    eval_spec:
      skill: progress-updater
      evals:
        - id: "real-1"
          name: "generate-progress-update"
          prompt: "Generate a progress update for this project. Summarize the current state, what has been completed, and what remains. Output in a structured format."
          assertions:
            - text: "shows_status"
              check: "status|progress|complete|pending|进度|状态|完成|待办"
            - text: "structured_format"
              check: "##|\\||─|━|完成|进行中|%"

  # --- 1.5 质量与文档类 (4 个) ---

  - id: TASK-013
    parent: "1.5.1"
    title: "api-doc-generator: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (api-doc-generator entry)"
    verification:
      - "assertions 检测 API 文档生成能力"
    eval_spec:
      skill: api-doc-generator
      evals:
        - id: "real-1"
          name: "generate-api-docs"
          prompt: "Analyze the backend API routes in this project and generate API documentation. List the endpoints, methods, and expected parameters. Output directly, do not create files."
          assertions:
            - text: "lists_endpoints"
              check: "GET|POST|PUT|DELETE|endpoint|route|/api|路由"
            - text: "describes_params"
              check: "param|body|query|header|request|response|参数|请求|响应"

  - id: TASK-014
    parent: "1.5.2"
    title: "requesting-code-review: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (requesting-code-review entry)"
    verification:
      - "assertions 检测审查调度和分类能力"
    eval_spec:
      skill: requesting-code-review
      evals:
        - id: "real-1"
          name: "plan-code-review"
          prompt: "Plan a code review for the most recent changes in this project. What should be checked in Phase 1 (spec compliance) and Phase 2 (code quality)? Do not actually perform the review."
          assertions:
            - text: "mentions_phase1"
              check: "Phase 1|spec|compliance|规范|合规|phase.1"
            - text: "mentions_phase2"
              check: "Phase 2|quality|code review|质量|审查|phase.2"
            - text: "categorizes_issues"
              check: "Critical|Important|Minor|critical|important|minor|严重|重要"

  - id: TASK-015
    parent: "1.5.3"
    title: "tdd-enforcer: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (tdd-enforcer entry)"
    verification:
      - "assertions 检测 TDD 流程验证"
    eval_spec:
      skill: tdd-enforcer
      evals:
        - id: "real-1"
          name: "verify-tdd-awareness"
          prompt: "Analyze the testing practices in this project. What TDD phases (RED-GREEN-REFACTOR) would apply to adding a new feature? What strictness level would you recommend?"
          assertions:
            - text: "mentions_tdd_phases"
              check: "RED|GREEN|REFACTOR|red|green|refactor|TDD"
            - text: "mentions_strictness"
              check: "strict|advisory|superpowers|strictness|级别|严格"

  - id: TASK-016
    parent: "1.5.4"
    title: "openspec-archive: 编写真实执行 eval"
    status: pending
    complexity: S
    estimated_hours: 1
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (openspec-archive entry)"
    verification:
      - "assertions 检测归档路径和元数据处理"
    eval_spec:
      skill: openspec-archive
      evals:
        - id: "real-1"
          name: "plan-spec-archival"
          prompt: "Check the openspec/changes/ directory and identify any specs that should be archived. What is the correct archive path format? Do not move any files."
          assertions:
            - text: "checks_changes"
              check: "changes/|openspec/changes|变更"
            - text: "knows_archive_format"
              check: "archive/|YYYY-MM-DD|\\d{4}-\\d{2}-\\d{2}|归档|日期"

  # ============================================================
  # Phase 2: Tier B 需适配 Skills (5 个)
  # ============================================================

  - id: TASK-017
    parent: "2.1"
    title: "brainstorm: 单轮降级测试"
    status: pending
    complexity: M
    estimated_hours: 1.5
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (brainstorm entry)"
    verification:
      - "首轮输出包含聚焦问题"
      - "不要求多轮对话"
    eval_spec:
      skill: brainstorm
      evals:
        - id: "real-1"
          name: "brainstorm-first-round"
          prompt: "Start a brainstorm about adding a real-time collaboration feature to this todo app. Ask focused questions to clarify the problem space. Output your first round of analysis and questions."
          assertions:
            - text: "asks_questions"
              check: "\\?|？|问题|question"
            - text: "explores_problem"
              check: "problem|challenge|考虑|问题空间|需求|场景|用户"
            - text: "structured_discussion"
              check: "##|─|阶段|方面|维度|aspect"

  - id: TASK-018
    parent: "2.2"
    title: "subagent-driver: 任务分解逻辑测试"
    status: pending
    complexity: M
    estimated_hours: 1.5
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (subagent-driver entry)"
    verification:
      - "测试任务分解和分配逻辑"
      - "不启动真实 subagent"
    eval_spec:
      skill: subagent-driver
      evals:
        - id: "real-1"
          name: "plan-subagent-delegation"
          prompt: "I have 3 tasks: 1) Add user model, 2) Create REST API routes, 3) Write unit tests. How would you delegate these to subagents? What isolation level is needed? Do not launch any subagents, just plan."
          assertions:
            - text: "plans_delegation"
              check: "subagent|agent|delegate|task|委派|代理|任务"
            - text: "considers_isolation"
              check: "isolat|worktree|branch|context|隔离|上下文"

  - id: TASK-019
    parent: "2.3"
    title: "forgejo-sync: 同步计划生成测试"
    status: pending
    complexity: M
    estimated_hours: 1.5
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (forgejo-sync entry)"
    verification:
      - "测试同步计划生成"
      - "不执行真实 API 调用"
    eval_spec:
      skill: forgejo-sync
      evals:
        - id: "real-1"
          name: "plan-issue-sync"
          prompt: "Analyze the user stories in docs/requirements/user-stories/ and plan how they would be synced to Forgejo issues. What labels and milestones should be created? Do not make any API calls."
          assertions:
            - text: "reads_stories"
              check: "US-|user.story|story|Story|需求"
            - text: "plans_sync"
              check: "sync|issue|label|milestone|同步|标签|里程碑"

  - id: TASK-020
    parent: "2.4"
    title: "requirements-sync: 漂移检测逻辑测试"
    status: pending
    complexity: M
    estimated_hours: 1.5
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (requirements-sync entry)"
    verification:
      - "测试需求状态漂移检测"
      - "本地验证，不依赖外部系统"
    eval_spec:
      skill: requirements-sync
      evals:
        - id: "real-1"
          name: "detect-requirements-drift"
          prompt: "Check the requirements documents in docs/requirements/ and analyze if there is any drift between PRD goals and current implementation status. Are there inconsistencies?"
          assertions:
            - text: "reads_requirements"
              check: "PRD|requirement|story|US-|需求|prd"
            - text: "detects_drift"
              check: "drift|inconsisten|gap|mismatch|漂移|不一致|差距|偏差|status|状态"

  - id: TASK-021
    parent: "2.5"
    title: "integration-tests: A→B 衔接场景测试"
    status: pending
    complexity: M
    estimated_hours: 1.5
    dependencies: []
    agent: qa-engineer
    deliverables:
      - "runner/config.json (integration-tests entry)"
    verification:
      - "测试 Phase A→B 衔接逻辑"
      - "单场景降级"
    eval_spec:
      skill: integration-tests
      evals:
        - id: "real-1"
          name: "verify-phase-handoff"
          prompt: "Verify the handoff between Phase A (planning) and Phase B (development) for this project. What artifacts from Phase A are needed to start Phase B? Check if the current state supports a smooth transition."
          assertions:
            - text: "identifies_artifacts"
              check: "spec|proposal|task|artifact|规范|提案|任务|产出物"
            - text: "checks_readiness"
              check: "ready|complete|missing|need|就绪|完成|缺少|需要"

  # ============================================================
  # Phase 3: 集成验证
  # ============================================================

  - id: TASK-022
    parent: "3.1"
    title: "合并所有 eval 到 config.json"
    status: pending
    complexity: M
    estimated_hours: 2
    dependencies:
      - TASK-001
      - TASK-002
      - TASK-003
      - TASK-004
      - TASK-005
      - TASK-006
      - TASK-007
      - TASK-008
      - TASK-009
      - TASK-010
      - TASK-011
      - TASK-012
      - TASK-013
      - TASK-014
      - TASK-015
      - TASK-016
      - TASK-017
      - TASK-018
      - TASK-019
      - TASK-020
      - TASK-021
    agent: qa-engineer
    deliverables:
      - "runner/config.json (完整 28 Skill 配置)"
    verification:
      - "config.json 包含 28 个 skill entry"
      - "所有 skill 的 enabled 为 true"
      - "JSON 格式合法"

  - id: TASK-023
    parent: "3.2"
    title: "执行全量 dry-run 验证配置"
    status: pending
    complexity: S
    estimated_hours: 0.5
    dependencies:
      - TASK-022
    agent: qa-engineer
    deliverables:
      - "dry-run 输出日志"
    verification:
      - "python run_benchmarks.py --dry-run 无报错"
      - "28 个 skill 全部列出"

  - id: TASK-024
    parent: "3.3"
