config:
  default_agent: knowledge-manager
  test_agent: qa-engineer
  docs_agent: knowledge-manager

  design_philosophy:
    approach: "document-driven"
    reference: "Superpowers test-driven-development"
    principle: "AI 读取文档理解并执行，而非运行代码"

  strictness_levels:
    advisory:
      description: "警告模式，允许绕过"
      checks: ["test_file_exists"]
      violation_action: "warning"

    strict:
      description: "严格模式，强制 RED 状态"
      checks: ["test_file_exists", "test_in_red_state"]
      violation_action: "block"

    superpowers:
      description: "完全模式，完整 TDD 循环"
      checks: ["test_file_exists", "test_in_red_state", "minimal_implementation", "no_golden_testing"]
      violation_action: "block_enforce"

  languages:
    python:
      frameworks: ["pytest", "unittest"]
      test_patterns: ["test_*.py", "*_test.py"]
    javascript:
      frameworks: ["jest", "mocha", "vitest"]
      test_patterns: ["*.test.js", "*.spec.js"]
    dart:
      frameworks: ["flutter", "dart"]
      test_patterns: ["*_test.dart"]

  # 文件删除清单 (v2.0 重构)
  files_to_delete:
    modules:
      - "cache.py"
      - "config.py"
      - "diff_analyzer.py"
      - "state_persistence.py"
      - "state_tracker.py"
    directories:
      - "test_runners/"
      - "validators/"
      - "hooks/"
      - "tests/"

