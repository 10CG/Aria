gaps:
  - scenario: "ORM Migration & Schema Evolution (SQLite → PostgreSQL migration)"
    required_capabilities: [orm-migration, query-optimization, database-schema]
    best_partial_match:
      agent: "backend-architect"
      matched: [database-schema]
      match_rate: 0.33
    gap_reason: >
      backend-architect covers database-schema design but lacks orm-migration
      (schema-migration tooling, migration scripts, rollback plans) and
      query-optimization (index tuning, EXPLAIN ANALYZE, N+1 detection).
      The SQLite → PostgreSQL migration is a major pending task in Kairos.
    suggested_agent:
      name: "database-specialist"
      capabilities: [orm-migration, query-optimization, database-schema, performance-optimization]

  - scenario: "CI/CD Pipeline (Nomad HCL, Docker build, automated test gate)"
    required_capabilities: [ci-cd-pipeline, infrastructure]
    best_partial_match:
      agent: "tech-lead"
      matched: [engineering-process]
      match_rate: 0.0  # engineering-process ≠ ci-cd-pipeline (no synonym overlap)
    gap_reason: >
      No agent has ci-cd-pipeline or infrastructure capabilities. tech-lead
      covers engineering-process but this does not match ci-cd or devops tooling
      (Nomad job specs, Docker multi-stage builds, deployment scripts, health
      check gates). Kairos uses Nomad HCL for all deployments.
    suggested_agent:
      name: "devops-engineer"
      capabilities: [ci-cd-pipeline, infrastructure, monitoring, deployment]

  - scenario: "Observability & Monitoring (logging, alerting, metrics)"
    required_capabilities: [monitoring]
    best_partial_match:
      agent: "qa-engineer"
      matched: []
      match_rate: 0.0
    gap_reason: >
      No agent has monitoring / observability capability. Kairos runs as a
      production sales system requiring structured logging, error alerting,
      provider health monitoring, and uptime dashboards. The evolution-engine
      tracks conversion ROI but operational telemetry has no specialist agent.
    suggested_agent:
      name: "devops-engineer"
      capabilities: [monitoring, ci-cd-pipeline, infrastructure]

  - scenario: "Voice / Media Processing Pipeline (ASR/TTS, FFmpeg, pHash)"
    required_capabilities: [performance-optimization, llm-integration]
    best_partial_match:
      agent: "ai-engineer"
      matched: [llm-integration]
      match_rate: 0.5
    gap_reason: >
      ai-engineer partially covers LLM integration but lacks domain knowledge
      for real-time audio processing (ASR/TTS providers, FFmpeg media
      transcoding, pHash deduplication, voice style management). This is a
      core Kairos differentiator (GLM voice pipeline) with no dedicated agent.
      match_rate 0.5 is on the boundary; flagged as gap due to domain
      specificity of audio/media engineering.
    suggested_agent:
      name: "media-engineer"
      capabilities: [voice-processing, media-pipeline, real-time-streaming, audio-optimization]

  - scenario: "WeChat / WeCom Channel Integration (platform-specific APIs)"
    required_capabilities: [api-design, native-integration]
    best_partial_match:
      agent: "backend-architect"
      matched: [api-design]
      match_rate: 0.5
    gap_reason: >
      backend-architect covers generic api-design but lacks native-integration
      for WeChat/WeCom platform-specific protocols (message encryption, token
      management, webhook verification, rate limiting by platform rules).
      mobile-developer has native-integration but targets iOS/Android SDKs,
      not messaging platform APIs. match_rate 0.5 flagged as gap due to
      platform-specific compliance requirements.
    suggested_agent:
      name: "channel-integration-specialist"
      capabilities: [native-integration, api-design, webhook-management, platform-compliance]

  - scenario: "Real-time Messaging & Event-driven Architecture (message-bus, message-queue)"
    required_capabilities: [performance-optimization, system-architecture]
    best_partial_match:
      agent: "tech-lead"
      matched: [system-architecture]
      match_rate: 0.5
    gap_reason: >
      tech-lead covers high-level system-architecture but lacks expertise in
      real-time event-driven patterns specific to messaging systems (async
      retry queues, back-pressure, dead-letter queues, message ordering
      guarantees). Kairos message-bus.ts + message-queue.ts are core to
      system reliability. match_rate 0.5; flagged as gap due to operational
      depth required.
    suggested_agent:
      name: "messaging-architect"
      capabilities: [event-driven-architecture, message-queue-design, real-time-processing, performance-optimization]

  - scenario: "RAG / Vector Search (Nexus cognitive platform integration)"
    required_capabilities: [rag-system, vector-search]
    best_partial_match:
      agent: "ai-engineer"
      matched: [rag-system, vector-search]
      match_rate: 1.0  # COVERED - see note
    gap_reason: >
      NOTE: This scenario is technically covered by ai-engineer (rag-system,
      vector-search capabilities present). However flagged for attention:
      Kairos integrates with Nexus (external cognitive platform) which
      abstracts vector search behind a proprietary SDK. The integration
      pattern differs from standard RAG (Qdrant/Pinecone direct access).
      Practical coverage is partial due to Nexus SDK specifics.
    suggested_agent:
      name: "ai-engineer (existing, sufficient with Nexus SDK context)"
      capabilities: [llm-integration, rag-system, vector-search, agent-orchestration]
    flagged_as_attention: true  # not a hard gap, but requires Nexus domain context

