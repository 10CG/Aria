# ── Step 2: tech_stack_mapping → required scenarios ──────────────────────────
# Rules applied (deterministic):
#   framework: Express      → [api-design, performance-optimization]
#   orm: SQLite/PostgreSQL  → [orm-migration, query-optimization, database-schema]
#   testing: Vitest         → [test-strategy]
#   deployment: Docker+Nomad→ [infrastructure, ci-cd-pipeline]
#   llm: Nexus/Gemini/Claude→ [llm-integration, rag-system, prompt-engineering, agent-orchestration]
#   voice: ASR/TTS          → [performance-optimization]  # media processing
#   channels: WeChat API    → [api-design]
#   evaluator: A/B engine   → [monitoring, quality-assessment]
#   crm + pipeline          → [system-architecture, service-boundary]
#   multi-agent orchestration→ [agent-orchestration]
#   documentation           → [documentation-audit, developer-documentation]
#   code changes            → [code-review, pre-merge-verification]

# ── Step 3: Tag normalization (capabilities-taxonomy.yaml synonyms applied) ──
# database-schema synonyms: [db-design, data-modeling, erd] → unified to database-schema
# orm-migration synonyms: [database-migration, schema-migration] → unified to orm-migration
# ci-cd-pipeline synonyms: [ci-cd, continuous-integration, devops] → unified to ci-cd-pipeline
# infrastructure synonyms: [infra, cloud-infra, deployment] → unified to infrastructure
# monitoring synonyms: [observability, logging, alerting] → unified to monitoring
# performance-optimization synonyms: [perf-tuning, optimization] → unified to performance-optimization
# api-design synonyms: [rest-api, endpoint-design, api-architecture] → unified to api-design
# test-strategy synonyms: [testing-plan, qa-strategy] → unified to test-strategy
# code-review synonyms: [review, pr-review] → unified to code-review

# ── Step 4: Match calculation ─────────────────────────────────────────────────
# Agent capability index (from frontmatter):
#   tech-lead:        [system-architecture, task-decomposition, engineering-process, cross-system-coordination, architecture-decision]
#   backend-architect:[api-design, database-schema, microservice-architecture, performance-optimization, service-boundary]
#   ai-engineer:      [llm-integration, rag-system, prompt-engineering, vector-search, agent-orchestration]
#   qa-engineer:      [test-strategy, defect-analysis, quality-assessment, risk-analysis, release-readiness]
#   code-reviewer:    [code-review, spec-compliance, security-audit, test-coverage-review, pre-merge-verification]
#   api-documenter:   [openapi-spec, sdk-generation, developer-documentation, api-versioning, interactive-docs]
#   knowledge-manager:[documentation-audit, knowledge-architecture, doc-codebase-alignment, ai-ddd-methodology]
#   context-manager:  [multi-agent-context, session-synthesis, context-optimization, decision-distillation]
#   ui-ux-designer:   [interface-design, wireframing, design-system, user-research, accessibility-audit]
#   mobile-developer: [react-native, flutter, native-integration, offline-sync, push-notification, app-deployment]
#   legal-advisor:    [privacy-policy, terms-of-service, gdpr-compliance, data-processing-agreement, regulatory-notice]

