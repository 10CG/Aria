suggested_new_agents:
  - name: "devops-engineer"
    priority: high
    rationale: >
      Covers ci-cd-pipeline, infrastructure, monitoring — 3 uncovered tags.
      Kairos is a production system requiring Nomad deployment expertise,
      Docker build pipelines, and operational observability. This gap
      affects all production deployments.
    suggested_capabilities: [ci-cd-pipeline, infrastructure, monitoring, deployment, security-audit]

  - name: "database-specialist"
    priority: medium
    rationale: >
      Covers orm-migration and query-optimization gaps.
      Kairos has a pending SQLite → PostgreSQL migration (major engineering
      task) and will need ongoing query tuning as data volume grows.
    suggested_capabilities: [orm-migration, query-optimization, database-schema, performance-optimization]

  - name: "media-engineer"
    priority: medium
    rationale: >
      Covers real-time audio/video processing domain.
      Kairos voice pipeline (ASR/TTS via GLM + FFmpeg) is a core differentiator
      with no specialist coverage. Media engineering differs significantly from
      general backend or AI engineering.
    suggested_capabilities: [voice-processing, media-pipeline, real-time-streaming, audio-optimization, codec-handling]

  - name: "channel-integration-specialist"
    priority: low
    rationale: >
      WeChat/WeCom platform-specific integration patterns (encryption,
      token refresh, webhook signature verification) are not covered by
      backend-architect's generic api-design.
    suggested_capabilities: [native-integration, webhook-management, platform-compliance, api-design]

methodology_notes:
  - "Matching is deterministic tag-based (no LLM scoring)"
  - "match_rate = matched_capabilities / required_capabilities"
  - "Scenarios with match_rate < 0.5 classified as gaps"
  - "Scenarios at exactly 0.5 flagged as attention if domain specificity warrants"
  - "Kairos actual tech stack differs slightly from task description: uses Vitest not Jest, uses better-sqlite3 not Prisma. Scenario mapping applied to actual stack."
  - "ui-ux-designer and mobile-developer have 0 utilization: Kairos is a headless backend automation system"
