openapi: 3.0.0
info:
  title: Task Management API
  version: 1.0.0

paths:
  /auth/login:
    post:
      summary: User login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful

  /auth/register:
    post:
      summary: User registration
      tags:
        - Authentication

  /tasks:
    get:
      summary: List all tasks
      tags:
        - Tasks
    post:
      summary: Create a new task
      tags:
        - Tasks

  /tasks/{id}:
    get:
      summary: Get task by ID
      tags:
        - Tasks
    put:
      summary: Update task
      tags:
        - Tasks
    delete:
      summary: Delete task
      tags:
        - Tasks

components:
  schemas:
    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string

    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        status:
          type: string
